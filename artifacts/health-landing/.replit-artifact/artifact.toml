kind = "web"
previewPath = "/"
title = "Health App Landing Page"
version = "1.0.0"
id = "artifacts/health-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20745

[services.development]
run = "pnpm --filter @workspace/health-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/health-landing", "run", "build" ]
publicDir = "artifacts/health-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20745"
BASE_PATH = "/"
