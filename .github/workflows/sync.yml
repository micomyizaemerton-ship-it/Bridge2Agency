          name: Auto Sync Cloud Repo

          on:
            push:
              branches:
                - main
            workflow_dispatch:
            schedule:
              - cron: "*/10 * * * *"

          jobs:
            sync:
              runs-on: ubuntu-latest

              steps:
                - name: Checkout master repo
                  uses: actions/checkout@v4

                - name: Remove old cloud copy
                  run: rm -rf synced/cloud

                - name: Clone latest cloud repo
                  run: git clone https://github.com/micomyizaemerton-ship-it/Bridge2Agency-cloud.git synced/cloud

                - name: Set git identity
                  run: |
                    git config user.name "auto-sync-bot"
                    git config user.email "bot@users.noreply.github.com"

                - name: Commit changes
                  run: |
                    git add synced/cloud
                    git commit -m "auto-sync cloud update" || echo "no changes"
                    git push