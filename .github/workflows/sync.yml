                    name: Auto Sync All AI Repos

                    on:
                      push:
                        branches:
                          - main
                      workflow_dispatch:
                      schedule:
                        - cron: "*/10 * * * *"

                    jobs:
                      sync:
                        runs-on: ubuntu-latest

                        steps:
                          - name: Checkout master repo
                            uses: actions/checkout@v4

                          # =========================
                          # SYNC REPO 1
                          # =========================
                          - name: Sync Bridge2Agency-cloud
                            run: |
                              rm -rf synced/cloud
                              git clone https://github.com/micomyizaemerton-ship-it/Bridge2Agency-cloud.git synced/cloud

                          # =========================
                          # SYNC REPO 2
                          # =========================
                          - name: Sync bridgeCare
                            run: |
                              rm -rf synced/bridgeCare
                              git clone https://github.com/micomyizaemerton-ship-it/bridgeCare.git synced/bridgeCare

                          # =========================
                          # COMMIT & PUSH CHANGES
                          # =========================
                          - name: Commit updates
                            run: |
                              git config user.name "auto-sync-bot"
                              git config user.email "bot@users.noreply.github.com"
                              git add synced
                              git commit -m "auto-sync: update all AI repos" || echo "no changes"
                              git push